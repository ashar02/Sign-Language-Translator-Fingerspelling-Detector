# Sign Language Translator - Docker Compose Configuration
# Usage:
#   Development: docker-compose up
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      # API Keys - Set these in your .env file or environment
      - CORRECTION_PROVIDER=${CORRECTION_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - CORRECTION_TEMPERATURE=${CORRECTION_TEMPERATURE:-0.7}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      # Server / traffic
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-5000}
      - TRAFFIC=${TRAFFIC:-http}
      - SSL_CERT_FILE=${SSL_CERT_FILE:-}
      - SSL_KEY_FILE=${SSL_KEY_FILE:-}
      # Configurable settings
      - STABILITY_THRESHOLD=${STABILITY_THRESHOLD:-5}
      - STABILITY_TIME_WINDOW=${STABILITY_TIME_WINDOW:-1.0}
      - STABILIZATION_DELAY=${STABILIZATION_DELAY:-2.0}
      - MIN_DETECTION_CONFIDENCE=${MIN_DETECTION_CONFIDENCE:-0.3}
      - SHOW_HEADER=${SHOW_HEADER:-true}
      - SHOW_FOOTER=${SHOW_FOOTER:-true}
      - SHOW_SIGN_TO_TEXT=${SHOW_SIGN_TO_TEXT:-true}
      - SHOW_TEXT_TO_SIGN=${SHOW_TEXT_TO_SIGN:-true}
    volumes:
      # Mount source code for development (hot reload)
      - ./UI:/app/UI
      - ./model:/app/model:ro
      - ./datasets:/app/datasets:ro
      # Optional TLS certs (set SSL_CERT_FILE / SSL_KEY_FILE to paths under certs/)
      - ./certs:/app/certs:ro
      # Don't mount these to use container's installed packages
      - /app/UI/__pycache__
    devices:
      # Enable camera access (Linux)
      - /dev/video0:/dev/video0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fk http://localhost:$${PORT:-5000}/health || curl -fk https://localhost:$${PORT:-5000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Note: For camera access on Windows/Mac, you may need to:
# 1. Use a different approach (not direct device mapping)
# 2. Or run the application natively instead of in Docker
#
# For production without camera (API-only mode):
# Remove the devices section and the camera will not be available
